<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>NexTime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/loginStyle.css">
</head>
<body>

  <div class="fundoLogin">
    
    <h1>NexTime</h1>
    <h2>Seu sistema de agendamentos automatizado</h2>
  
    <form id="formLogin">
      <input type="text" name="email" class="login" id="email" placeholder="E-mail"><br>
      <input type="password" name="senha" class="login" id="senha" placeholder="Senha"><br>
      <input type="submit" name="btLogin" value="Login" id="btLogin">
      <a href="#" class="ajuda"><p>Esqueceu sua senha? Clique aqui!</p></a>
      <a href="#" class="ajuda"><p id="cadastre-se">É novo por aqui? Cadastre-se!</p></a>
    </form>

  </div>
  

  
  <script src="/assets/js/login.js"></script>
  
</body>
</html>
