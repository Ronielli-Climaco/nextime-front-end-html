<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calendário Aberto</title>

  <!-- Estilo do Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>
<body>

  <h2>Selecione uma data:</h2>
  <input type="text" id="calendario">

  <!-- Script do Flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    flatpickr("#calendario", {
      inline: true, // Exibe o calendário aberto
      locale: "pt"  // Traduz para português (opcional, precisa do arquivo de idioma)
    });
  </script>
</body>
</html>
